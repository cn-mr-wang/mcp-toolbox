<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MCP Toolbox{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        .badge-python { background-color: #3776ab; }
        .badge-shell { background-color: #4eaa25; }
        .badge-java { background-color: #f89820; }
        .badge-sql { background-color: #4479a1; }
        .status-success { color: #16a34a; }
        .dark .status-success { color: #4ade80; }
        .status-error { color: #dc2626; }
        .dark .status-error { color: #f87171; }
        pre.json-block {
            background: #1e293b;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 0.75rem;
            overflow-x: auto;
            font-size: 0.875rem;
            max-height: 400px;
        }
        pre.code-block {
            background: #1e293b;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 0.75rem;
            overflow-x: auto;
            font-size: 0.8rem;
            line-height: 1.5;
        }
        /* Smooth transitions for theme switching */
        body, .theme-transition, .theme-transition * {
            transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
        }
        /* Nav link hover effect */
        .nav-link { position: relative; }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            border-radius: 1px;
            transition: width 0.25s ease, left 0.25s ease;
        }
        .nav-link:hover::after, .nav-link.active::after {
            width: 80%;
            left: 10%;
        }
        /* Nav gradient glow line */
        .nav-glow {
            height: 2px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899, #f59e0b);
            background-size: 200% 100%;
            animation: glow-slide 8s ease infinite;
        }
        @keyframes glow-slide {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        /* Card hover lift */
        .card-hover {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px -5px rgba(0,0,0,0.1), 0 4px 10px -5px rgba(0,0,0,0.04);
        }
        .dark .card-hover:hover {
            box-shadow: 0 8px 25px -5px rgba(0,0,0,0.4), 0 4px 10px -5px rgba(0,0,0,0.2);
        }
        /* Stat accent bar */
        .stat-accent {
            position: relative;
            overflow: hidden;
        }
        .stat-accent::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            border-radius: 0 4px 4px 0;
        }
        .accent-blue::before { background: linear-gradient(180deg, #3b82f6, #60a5fa); }
        .accent-purple::before { background: linear-gradient(180deg, #8b5cf6, #a78bfa); }
        .accent-green::before { background: linear-gradient(180deg, #10b981, #34d399); }
        .accent-amber::before { background: linear-gradient(180deg, #f59e0b, #fbbf24); }
        /* Section header accent */
        .section-accent {
            border-left: 3px solid;
            border-image: linear-gradient(180deg, #3b82f6, #8b5cf6) 1;
        }
        /* Table row hover glow */
        .row-hover {
            transition: background-color 0.15s ease;
        }
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
    <!-- Theme init (before paint to avoid flash) -->
    <script>
        (function() {
            const pref = localStorage.getItem('theme') || 'system';
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (pref === 'dark' || (pref === 'system' && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen text-gray-900 dark:text-gray-100">

                        <span class="bg-gradient-to-r from-white to-slate-300 bg-clip-text text-transparent">MCP Toolbox</span>
                    </a>
                    <div class="hidden sm:flex items-center space-x-1">
                        <a href="/" class="nav-link text-slate-400 hover:text-white px-3 py-2 rounded-lg text-sm font-medium transition-colors" data-i18n="nav.dashboard">Dashboard</a>
                        <a href="/tools" class="nav-link text-slate-400 hover:text-white px-3 py-2 rounded-lg text-sm font-medium transition-colors" data-i18n="nav.tools">Tools</a>
                        <a href="/logs" class="nav-link text-slate-400 hover:text-white px-3 py-2 rounded-lg text-sm font-medium transition-colors" data-i18n="nav.logs">Logs</a>
                        <a href="/access" class="nav-link text-slate-400 hover:text-white px-3 py-2 rounded-lg text-sm font-medium transition-colors" data-i18n="nav.tokens">Access</a>
                    </div>
                </div>
                <!-- Right: language + theme toggles -->
                <div class="flex items-center space-x-3">
                    <!-- Language toggle -->
                    <button id="lang-toggle" onclick="toggleLang()" class="text-slate-400 hover:text-white px-2.5 py-1.5 rounded-lg text-sm font-medium transition-colors hover:bg-slate-800">
                        EN
                    </button>
                    <!-- Theme toggle -->
                    <div class="flex items-center bg-slate-800 dark:bg-slate-900 rounded-lg p-0.5 border border-slate-700/50">
                        <button onclick="setTheme('light')" id="theme-light" class="p-1.5 rounded-md text-slate-400 hover:text-white transition-colors" title="Light">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                        </button>
                        <button onclick="setTheme('system')" id="theme-system" class="p-1.5 rounded-md text-slate-400 hover:text-white transition-colors" title="System">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                        </button>
                        <button onclick="setTheme('dark')" id="theme-dark" class="p-1.5 rounded-md text-slate-400 hover:text-white transition-colors" title="Dark">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <!-- Gradient glow line -->
        <div class="nav-glow"></div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-8">

            <span>Powered by FastMCP + FastAPI</span>

    </footer>

    let currentLang = localStorage.getItem('lang') || (navigator.language.startsWith('zh') ? 'zh' : 'en');

    function applyI18n() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            const val = I18N[currentLang]?.[key];
            if (val !== undefined) {
                if (el.tagName === 'INPUT' && el.hasAttribute('placeholder')) {
                    el.placeholder = val;
                } else {
                    el.textContent = val;
                }
            }
        });
        document.getElementById('lang-toggle').textContent = currentLang === 'zh' ? 'EN' : '中';
        document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
    }

    function toggleLang() {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        localStorage.setItem('lang', currentLang);
        applyI18n();
    }

    // ── Theme ──
    function setTheme(mode) {
        localStorage.setItem('theme', mode);
        applyTheme(mode);
    }

    function applyTheme(mode) {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = mode === 'dark' || (mode === 'system' && prefersDark);
        document.documentElement.classList.toggle('dark', isDark);

        ['light', 'system', 'dark'].forEach(m => {
            const btn = document.getElementById('theme-' + m);
            if (btn) {
                if (m === mode) {
                    btn.classList.add('bg-slate-600', 'text-white');
                    btn.classList.remove('text-slate-400');
                } else {
                    btn.classList.remove('bg-slate-600', 'text-white');
                    btn.classList.add('text-slate-400');
                }
            }
        });
    }

    // Init
    applyTheme(localStorage.getItem('theme') || 'system');
    applyI18n();

    // Listen for system theme changes
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        if ((localStorage.getItem('theme') || 'system') === 'system') {
            applyTheme('system');
        }
    });

    // Mark active nav link
    document.querySelectorAll('.nav-link').forEach(link => {
        if (link.pathname === window.location.pathname ||
            (link.pathname !== '/' && window.location.pathname.startsWith(link.pathname))) {
            link.classList.add('active', 'text-white');
            link.classList.remove('text-slate-400');
        }
    });
    </script>
